# This workflow will build and publish OsReleaseNet to Nuget.

name: Publish Package to Nuget

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-publish:
      runs-on: ubuntu-latest
  
      permissions:
        id-token: write 
      environment: production
        
      steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: 10.0.x
      - name: Restore dependencies
        run: dotnet restore
        working-directory: src
      - name: Create packages
        run: dotnet build -c Release
        working-directory: src
        
          # Get a short-lived NuGet API key
      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1.2.0
        id: login
        with:
            user: ${{ secrets.NUGET_USER }}
              
          # Push the package
      - name: NuGet push
        run: dotnet nuget push src/OsReleaseNet/bin/Release/*.nupkg --api-key ${{steps.login.outputs.NUGET_API_KEY}} --source https://api.nuget.org/v3/index.json
      - name: NuGet push
        run: dotnet nuget push src/OsReleaseNet.Extensions.DependencyInjection/bin/Release/*.nupkg --api-key ${{steps.login.outputs.NUGET_API_KEY}} --source https://api.nuget.org/v3/index.json
